{% extends "base.html" %}
{% block content %}
<h1>Ajouter un produit</h1>
<form method="post">
  <label>Nom <input name="name" required maxlength="100"></label>
  <label>Description <textarea name="description" required maxlength="500"></textarea></label>
  <label>Prix <input name="price" type="number" min="0" step="0.01" required></label>
  <label>Quantité <input name="quantity" type="number" min="0" required></label>
  <button type="submit">Ajouter</button>
</form>
{% endblock %}
